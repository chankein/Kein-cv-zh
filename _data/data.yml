brief:
    title: About Me
    summary: |
      Senior Engineer with over 6 years of experience in practical AI/Big-Data projects.<br/>
      Provide solutions for the Japanese Government, Toyota, Fuji Film(Xerox), Cisco, and Fujitsu Network Solutions.<br/>
      <br/>
      Currently working in Japan as a permanent resident.<br/>
      Seeking job opportunities in Macao for family reasons.
    
career-profile:
    title: 職業簡介(Career Profile)
    summary: |
      專案經驗集中於大數據應用落地,擁有超過6年經驗的資深大數據/後端工程師.
      <br/>
      曾為日本政府戶籍管理科,豐田Woven-city,富士膠片,思科,富士通提供系統開發服務.
      <br/>
      <br/>
      致力於包括智能推薦系統,人性機械人應用,自動化網路配置,OCR文字識別等數據應用專案.
      <br/>
      <br/>
      具備高度的機器學習知識和數據可視化能力.
      <br/>
      <br/>
      熟悉數據倉庫設計和搭建,具有為日活3400萬的社交APP搭建大數據倉庫和分析平臺的經驗.
      <br/>
    changelanguage: To English
    changelanguageurl: https://chankein.github.io/Kein-cv/ 

experiences:
    - role: 後端工程師
      time: 2019 - 至今
      company: Outsourcing Technology(TSE Code:2427), 東京 
      details: |
        以後端工程師的身份參與TRI-AD(現Woven planet),富士菲林和富士通網路的開發專案.
        - 運用微服務系統開發技術,負責設計和開發了豐田智能都市(Woven City)智能物流配送系統的服務端部分. 該系統管理超過3000臺配送機器人網路.
        - 參與富士菲林負責的日本政府戶籍科的戶籍電子化促進專案,開發了5款windows軟體輔助解決戶籍系統.
          通過導入OCR文字識別技術,將掃描圖像格式的戶籍藤本轉換成結構化文字資訊,實現將人工識別需十年以上的處理變為數小時以內的自動處理.
        - 參與富士通網路公司的網路通信幹線和網路設備可視化監測平臺的開發,為NTT(日本電信)現有的網路線路系統和開發中的5G網路系統提供設備狀態監測和網路線路可視化檢測和自動故障報警服務.
      description: | 
        名詞解釋:
        - TRI-AD: Toyota Research Institute - Advanced Development.豐田集團的核心研發機構
        - Woven City: 位於日本靜岡縣內,可供超過3000戶居民居住的社區.是由豐田集團主導開發用於展示未來人類居住概念的智能都市.
        - OCR: Optical Character Recognition,文字識別技術
        - NTT: Nippon Telegraph and Telephone,日本電信

    - role: 後端工程師
      time: 2018 - 2019
      company: Oriental Kingdom Group, 東京
      details: |
        參與軟銀機器人和思科網路的開發專案.
          - 參加軟銀旗下人形機器人Pepper的對企業開發專案,負責設計和執行Pepper管理系統和Pepper的軟體專案測試.
          - 參與開發了思科的SDN工具軟體開發,開發了為大規模網路設備設置提供自適應學習功能的模組.
      description: | 
        名詞解釋:
        - SDN: Software-Defined Networking,軟體定義網路.
    
    - role: 大數據工程師
      time: 2015 - 2018
      company: 辣媽幫科技有限公司, 深圳
      details: |
        伴隨著辣媽幫APP及其姐妹APP用戶的快速增長,原有的數據處理和數據倉庫系統變得難以滿足日漸膨脹的數據量.
        - 在我任職期間,參與設計和配置了新的數據倉庫,滿足了用戶日活躍量從30萬到340萬的數據處理和存儲需求.
        - 因應臨時數據需求,每年提供超過2000份數據提取彙報紀錄.
        - 在數據組內共同開發了OSS系統作為日常數據統計指標計算和展示,為公司內多個部門提供數據支持.
        - 通過建立用戶畫像分析,A/B Test技術,為公司的用戶開發策略,數據驅動開發提供了數據決策支持.
      description: | 
        名詞解釋:
        - ETL: Extract-Transform-Load,數據抽取、轉換和加載
    - role: 系統工程師
      time: 2014.04 - 2015.09
      company: Lino-A Co, 京都
      details: |
        用WordPress開發了面向遊客的多語言多平臺旅遊資訊系統,為下田市觀光協會,彥根市觀光協會提供服務.

    - role: 剪輯師
      time: 2008.04 - 2009.09
      company: 遠目影視有限公司, 珠海
      details: |
        負責公司承接的廣告視頻和電視節目的後期剪輯.

      goToProject: 點此轉到專案細節頁面.
